<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Смена пароля</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 350px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357bd8;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      color: green;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Смена пароля</h2>

    <form id="passwordForm">
      <input type="password" placeholder="Старый пароль" required />
      <input type="password" placeholder="Новый пароль" required />
      <input type="password" placeholder="Подтвердите пароль" required />

      <button type="submit">Сменить пароль</button>
    </form>

    <div class="message" id="successMessage">
      Пароль успешно изменён
    </div>
  </div>

  <script>
    const form = document.getElementById('passwordForm');
    const message = document.getElementById('successMessage');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      message.style.display = 'block';
      form.reset();
    });
  </script>

</body>
</html>
